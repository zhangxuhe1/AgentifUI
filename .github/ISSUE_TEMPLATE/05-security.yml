name: 🔒 Security Issue / 安全问题
description: Report a security vulnerability (Use privately for sensitive issues) / 报告安全漏洞（敏感问题请私下使用）
title: "[SECURITY] "

body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **IMPORTANT SECURITY NOTICE / 重要安全提示**
        
        If this is a sensitive security vulnerability, please **DO NOT** submit it here. Instead, please email us directly at: **security@iflabx.com**
        
        如果这是敏感的安全漏洞，请**不要**在此提交。请直接发送电子邮件至：**security@iflabx.com**
        
        Only use this form for:
        - Non-sensitive security improvements
        - Security-related questions
        - General security hardening suggestions
        
        仅在以下情况下使用此表单：
        - 非敏感的安全改进
        - 安全相关问题
        - 一般安全加固建议

  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Security Acknowledgment / 安全确认
      description: Please confirm you understand our security reporting process / 请确认您了解我们的安全报告流程
      options:
        - label: I understand that sensitive vulnerabilities should be reported privately / 我了解敏感漏洞应私下报告
          required: true
        - label: This is not a sensitive security vulnerability / 这不是敏感的安全漏洞
          required: true
        - label: I confirm that I am using English to submit this report / 我确认使用英文提交此报告
          required: true

  - type: dropdown
    id: type
    attributes:
      label: Security Issue Type / 安全问题类型
      description: What type of security issue is this? / 这是什么类型的安全问题？
      options:
        - Security Configuration / 安全配置
        - Access Control / 访问控制
        - Data Protection / 数据保护
        - Authentication / 身份验证
        - Authorization / 授权
        - Input Validation / 输入验证
        - API Security / API安全
        - Database Security / 数据库安全
        - Dependency Security / 依赖安全
        - Security Documentation / 安全文档
        - Security Best Practices / 安全最佳实践
        - Other / 其他
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Security Issue Summary / 安全问题摘要
      description: Briefly describe the security concern / 简要描述安全问题
      placeholder: "e.g., Missing authentication check in API endpoint / API端点缺少身份验证检查"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed Description / 详细描述
      description: Provide a detailed description of the security concern / 提供安全问题的详细描述
      placeholder: |
        **What is the security concern? / 安全问题是什么？**
        

        **What could be the potential impact? / 潜在影响是什么？**
        

        **How did you discover this? / 您是如何发现这个的？**
        
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity Assessment / 严重性评估
      description: How would you rate the severity of this security issue? / 您如何评估此安全问题的严重性？
      options:
        - Low - Minimal security impact / 低 - 最小安全影响
        - Medium - Moderate security impact / 中等 - 中等安全影响
        - High - Significant security risk / 高 - 重大安全风险
        - Critical - Severe security vulnerability / 严重 - 严重安全漏洞
    validations:
      required: true

  - type: textarea
    id: affected_components
    attributes:
      label: Affected Components / 受影响的组件
      description: Which parts of AgentifUI are affected? / AgentifUI的哪些部分受到影响？
      placeholder: |
        List the affected components, files, or features:
        列出受影响的组件、文件或功能：
        
        - Authentication system
        - API endpoints
        - Database connections
        - Frontend components
        - Configuration files

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction Steps / 重现步骤
      description: How can this security issue be reproduced? (If safe to share) / 如何重现此安全问题？（如果可以安全分享）
      placeholder: |
        Provide steps to reproduce (only if it's safe to share publicly):
        提供重现步骤（仅在可以公开安全分享时）：
        
        1. 
        2. 
        3. 
        
        **Note:** Do not include actual exploit code or sensitive details.
        **注意：** 不要包含实际的漏洞代码或敏感细节。

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested Fix / 建议修复
      description: Do you have suggestions for how to fix this security issue? / 您对如何修复此安全问题有建议吗？
      placeholder: |
        Provide your suggestions for addressing this security concern:
        提供您解决此安全问题的建议：
        
        - Configuration changes
        - Code modifications
        - Additional security measures
        - Documentation updates

  - type: textarea
    id: environment
    attributes:
      label: Environment Details / 环境详细信息
      description: Provide relevant environment information / 提供相关环境信息
      placeholder: |
        - AgentifUI version: (e.g., 0.1.0, main branch)
        - Operating System: (e.g., macOS 14.0, Windows 11)
        - Database: (e.g., Supabase hosted, local)
        - Deployment method: (e.g., local dev, PM2, Docker)
        - Network configuration: (if relevant)
      value: |
        - AgentifUI version:
        - Operating System:
        - Database:
        - Deployment method:
        - Network configuration:

  - type: checkboxes
    id: responsible_disclosure
    attributes:
      label: Responsible Disclosure / 负责任的披露
      description: Please confirm your commitment to responsible disclosure / 请确认您对负责任披露的承诺
      options:
        - label: I will not publicly disclose this issue until it has been addressed / 在问题得到解决之前，我不会公开披露此问题
          required: true
        - label: I understand that security issues require careful handling / 我了解安全问题需要谨慎处理
          required: true 