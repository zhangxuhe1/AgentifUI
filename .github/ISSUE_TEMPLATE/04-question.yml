name: ❓ Question / Support / 问题/支持
description: Ask a question or get help with using AgentifUI / 询问问题或获取使用AgentifUI的帮助

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reaching out! We're here to help you with AgentifUI.
        
        感谢您的联系！我们在这里帮助您使用AgentifUI。
        
        **Before submitting, please check:**
        - [Documentation](https://github.com/ifLabX/AgentifUI/tree/main/docs)
        - [Existing Issues](https://github.com/ifLabX/AgentifUI/issues)
        - [README](https://github.com/ifLabX/AgentifUI#readme)
        
        **在提交之前，请检查：**
        - [文档](https://github.com/ifLabX/AgentifUI/tree/main/docs)
        - [现有问题](https://github.com/ifLabX/AgentifUI/issues)
        - [README](https://github.com/ifLabX/AgentifUI#readme)

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Self Checks / 自检清单
      description: Please confirm you have completed the following steps / 请确认您已完成以下步骤
      options:
        - label: This is only for questions/support, if you found a bug, please use Bug Report template / 这仅用于问题/支持，如果您发现错误，请使用错误报告模板
          required: true
        - label: I have searched for existing issues and discussions / 我已搜索现有问题和讨论
          required: true
        - label: I have read the relevant documentation / 我已阅读相关文档
          required: true
        - label: I confirm that I am using English to submit this report / 我确认使用英文提交此报告
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Question Category / 问题类别
      description: What type of question do you have? / 您有什么类型的问题？
      options:
        - Installation & Setup / 安装和设置
        - Dify API Integration / Dify API集成
        - Authentication / 身份验证
        - Database Setup / 数据库设置
        - Deployment / 部署
        - Performance / 性能
        - Feature Usage / 功能使用
        - Development / 开发
        - Best Practices / 最佳实践
        - Other / 其他
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Question Summary / 问题摘要
      description: Briefly describe your question / 简要描述您的问题
      placeholder: "e.g., How to configure Dify API keys for multiple users? / 如何为多个用户配置Dify API密钥？"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed Question / 详细问题
      description: Provide a detailed description of your question / 提供您问题的详细描述
      placeholder: |
        **What are you trying to accomplish? / 您想完成什么？**
        

        **What specific help do you need? / 您需要什么具体帮助？**
        

        **What have you already tried? / 您已经尝试了什么？**
        
    validations:
      required: true

  - type: textarea
    id: logs_or_code
    attributes:
      label: Relevant Code or Logs / 相关代码或日志
      description: Share any relevant code snippets, configuration, or error messages / 分享任何相关的代码片段、配置或错误消息
      placeholder: |
        Please paste any relevant code, configuration, or error messages here.
        请在此粘贴任何相关的代码、配置或错误消息。
      render: code

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context / 其他信息
      description: Any additional context that would be helpful / 任何有助于解决问题的其他信息
      placeholder: |
        - Screenshots or videos
        - Related issues or discussions
        - What outcome are you hoping for? 