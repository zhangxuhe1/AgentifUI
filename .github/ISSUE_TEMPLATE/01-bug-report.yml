name: 🐛 Bug Report / 错误报告
description: Report a bug to help us improve AgentifUI / 报告错误帮助我们改进AgentifUI

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug! Your feedback helps make AgentifUI better for everyone.
        
        感谢您花时间报告此错误！您的反馈有助于让AgentifUI对每个人都更好。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Self Checks / 自检清单
      description: Please confirm you have completed the following steps / 请确认您已完成以下步骤
      options:
        - label: This is only for bug report, if you would like to ask a question, please head to Discussions / 这仅用于错误报告，如果您想提问，请前往讨论区
          required: true
        - label: I have searched for existing issues / 我已搜索现有问题
          required: true
        - label: I confirm that I am using English to submit this report / 我确认使用英文提交此报告
          required: true
        - label: Please do not modify this template and fill in all the required fields / 请不要修改此模板并填写所有必填字段
          required: true

  - type: input
    id: version
    attributes:
      label: AgentifUI Version / 版本
      description: Which version of AgentifUI are you using? / 您使用的是哪个版本的AgentifUI？
      placeholder: "e.g., 0.1.0, main branch, commit hash"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment / 环境
      description: How are you running AgentifUI? / 您如何运行AgentifUI？
      options:
        - Local Development (pnpm dev) / 本地开发
        - Production (PM2) / 生产环境
        - Docker / 容器部署
        - Other / 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description / 错误描述
      description: A clear and concise description of what the bug is / 对错误的清晰简洁描述
      placeholder: |
        Describe what happened and what you expected to happen.
        描述发生了什么以及您期望发生什么。
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce / 重现步骤
      description: Please provide step-by-step instructions to reproduce the issue / 请提供重现问题的分步说明
      placeholder: |
        1. Go to '...' / 转到'...'
        2. Click on '...' / 点击'...'
        3. See error / 看到错误
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: ✔️ Expected Behavior / 期望行为
      description: What should have happened? / 应该发生什么？
      placeholder: Describe the expected outcome...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: ❌ Actual Behavior / 实际行为
      description: What actually happened? / 实际发生了什么？
      placeholder: Describe what actually happened...

  - type: textarea
    id: logs
    attributes:
      label: Console Logs / 控制台日志
      description: Please paste any relevant console logs, error messages, or stack traces / 请粘贴任何相关的控制台日志、错误消息或堆栈跟踪
      placeholder: Paste console output here...
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 其他信息
      description: |
        Add any other context about the problem here, such as:
        - Screenshots or videos
        - Configuration details
        - Related issues or workarounds
        
        在此添加有关问题的任何其他上下文，例如：
        - 截图或视频
        - 配置详细信息
        - 相关问题或解决方法
      placeholder: |
        You can attach images or log files by clicking this area to highlight it and then dragging files in.
        您可以通过点击此区域突出显示，然后拖入文件来附加图像或日志文件。 